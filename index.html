<!DOCTYPE html>
<html>

<head>

<title>Smart Disaster Relief Management</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select{
width:250px;
padding:8px;
margin-top:4px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:10px;
padding:8px 15px;
background:#007bff;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.success{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<h1>Smart Disaster Relief Management System</h1>

<div class="container">

<!-- ADD CAMP -->
<div class="card">

<h2>Add Relief Camp</h2>

<label>Camp ID</label>
<input id="camp_id">

<label>Location</label>
<input id="location">

<label>Capacity</label>
<input id="capacity" type="number">

<label>Food Packets</label>
<input id="food_packets" type="number">

<label>Medical Kits</label>
<input id="medical_kits" type="number">

<label>Volunteers</label>
<input id="volunteers" type="number">

<button onclick="addCamp()">Add Camp</button>

<p id="camp_msg"></p>

</div>


<!-- REGISTER VICTIM -->
<div class="card">

<h2>Register Victim</h2>

<label>Victim ID</label>
<input id="victim_id">

<label>Name</label>
<input id="name">

<label>Age</label>
<input id="age" type="number">

<label>Health Condition</label>
<select id="health">
<option value="normal">Normal</option>
<option value="critical">Critical</option>
</select>

<label>Camp ID</label>
<input id="camp_assign">

<button onclick="registerVictim()">Register Victim</button>

<p id="victim_msg"></p>

</div>


<!-- CAMPS TABLE -->
<div class="card">

<h2>Relief Camps</h2>

<button onclick="loadCamps()">Refresh Camps</button>

<table id="campTable">

<tr>
<th>Camp ID</th>
<th>Location</th>
<th>Capacity</th>
<th>Food</th>
<th>Medical</th>
<th>Volunteers</th>
<th>Occupied</th>
</tr>

</table>

</div>


<!-- VICTIMS TABLE -->
<div class="card">

<h2>Victims</h2>

<button onclick="loadVictims()">Refresh Victims</button>

<table id="victimTable">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Health</th>
<th>Camp</th>
<th>Action</th>
</tr>

</table>

</div>


<!-- SEARCH VICTIM -->
<div class="card">

<h2>Search Victim</h2>

<label>Victim ID</label>
<input id="search_id">

<button onclick="searchVictim()">Search</button>

<p id="search_result"></p>

</div>

</div>

<script>

const API="http://127.0.0.1:5000"


function addCamp(){

let data={
camp_id:camp_id.value,
location:location.value,
capacity:Number(capacity.value),
food_packets:Number(food_packets.value),
medical_kits:Number(medical_kits.value),
volunteers:Number(volunteers.value)
}

fetch(API+"/add_camp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

.then(res=>res.json())
.then(d=>{

camp_msg.innerText=d.message
camp_msg.className="success"

camp_id.value=""
location.value=""
capacity.value=""
food_packets.value=""
medical_kits.value=""
volunteers.value=""

loadCamps()

})

}


function registerVictim(){

let data={
victim_id:victim_id.value,
name:name.value,
age:Number(age.value),
health:health.value,
camp_id:camp_assign.value
}

fetch(API+"/register_victim",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

.then(res=>res.json())
.then(d=>{

victim_msg.innerText=d.message
victim_msg.className="success"

victim_id.value=""
name.value=""
age.value=""
camp_assign.value=""

loadVictims()
loadCamps()

})

}


function loadCamps(){

fetch(API+"/get_camps")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("campTable")

table.innerHTML=`
<tr>
<th>Camp ID</th>
<th>Location</th>
<th>Capacity</th>
<th>Food</th>
<th>Medical</th>
<th>Volunteers</th>
<th>Occupied</th>
</tr>
`

data.forEach(c=>{

table.innerHTML+=`
<tr>
<td>${c.camp_id}</td>
<td>${c.location}</td>
<td>${c.capacity}</td>
<td>${c.food_packets}</td>
<td>${c.medical_kits}</td>
<td>${c.volunteers}</td>
<td>${c.occupied}</td>
</tr>
`

})

})

}


function loadVictims(){

fetch(API+"/get_victims")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("victimTable")

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Health</th>
<th>Camp</th>
<th>Action</th>
</tr>
`

data.forEach(v=>{

table.innerHTML+=`
<tr>
<td>${v.victim_id}</td>
<td>${v.name}</td>
<td>${v.age}</td>
<td>${v.health}</td>
<td>${v.camp_id}</td>

<td>
<button onclick="deleteVictim('${v.victim_id}')">
Delete
</button>
</td>

</tr>
`

})

})

}

function deleteVictim(id){

if(!confirm("Are you sure you want to delete this victim?")){
return
}

fetch(API+"/remove_victim/"+id,{
method:"DELETE"
})

.then(res=>res.json())

.then(data=>{

alert(data.message)

loadVictims()
loadCamps()

})

}

function searchVictim(){

let id=search_id.value

fetch(API+"/search_victim/"+id)

.then(res=>res.json())

.then(v=>{

if(v.message){

search_result.innerText=v.message
search_result.className="error"

}else{

search_result.innerText=
`Name: ${v.name} | Age: ${v.age} | Health: ${v.health} | Camp: ${v.camp_id}`

search_result.className="success"

}

})

}


loadCamps()
loadVictims()

</script>

</body>
</html>
